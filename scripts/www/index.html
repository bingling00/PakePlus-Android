<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>默认 - 数据展示</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f5f7; color: #1e1e2e; }
        .header { max-width: 1200px; margin: 0 auto; padding: 20px 20px 0; }
        .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
        .toolbar h1 { margin: 0; font-size: 20px; }
        .toolbar input[type="text"] { padding: 6px 10px; border: 1px solid #d0d0d8; border-radius: 5px; font-size: 13px; }
        #apiInput { flex: 1; min-width: 200px; }
        #searchInput { width: 180px; }
        .btn { padding: 6px 16px; background: #4f46e5; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; }
        .btn:hover { background: #4338ca; }
        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; max-width: 1200px; margin: 0 auto; padding: 0 20px 20px; }
        .card { background: #fff; border: 1px solid #e8e8ec; border-radius: 8px; overflow: hidden; transition: border-color 0.2s; }
        .card:hover { border-color: #c7d2fe; }
        .card-img { width: 100%; height: 150px; background: #fafafa; display: flex; align-items: center; justify-content: center; color: #888; font-size: 12px; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-title { font-size: 13px; font-weight: 600; padding: 8px 10px 2px; }
        .card-stock { font-size: 12px; color: #555; padding: 2px 10px 8px; }
        .card-stock.low { color: #ef4444; }
        .loading, .error { text-align: center; padding: 40px; color: #888; }
        .error { color: #ef4444; }
        .count { font-size: 12px; color: #888; padding: 0 20px 10px; max-width: 1200px; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="header">
        <div class="toolbar">
            <h1>默认</h1>
            <input id="apiInput" type="text" value="http://127.0.0.1:18077">
            <input id="searchInput" type="text" placeholder="搜索标题...">
            <button class="btn" onclick="load()">刷新</button>
        </div>
    </div>
    <div id="count" class="count"></div>
    <div id="app" class="cards"></div>
    <script>
        let gCards = [], gFields = {};

        async function load() {
            const app = document.getElementById('app');
            app.innerHTML = '<div class="loading">加载中...</div>';
            try {
                const api = document.getElementById('apiInput').value;
                const dbName = '默认';
                const [dbRes, cardsRes] = await Promise.all([
                    fetch(`${api}/api/databases/${dbName}`),
                    fetch(`${api}/api/databases/${dbName}/cards`)
                ]);
                if (!dbRes.ok || !cardsRes.ok) throw new Error('API请求失败');
                const dbJson = await dbRes.json();
                const cardsJson = await cardsRes.json();

                gFields = dbJson.data.fields || [];
                gCards = cardsJson.data || [];

                render();
            } catch (e) {
                app.innerHTML = `<div class="error">加载失败: ${e.message}<br>请确保main.py API服务已启动</div>`;
                document.getElementById('count').textContent = '';
            }
        }

        function render() {
            const app = document.getElementById('app');
            const titleField = gFields.find(f => f.name === '标题');
            const imgField = gFields.find(f => f.name === '图片');
            const totalStockField = gFields.find(f => f.name === '总库存');
            const salesField = gFields.find(f => f.name === '销量');

            const search = document.getElementById('searchInput').value.trim().toLowerCase();
            const filtered = search ? gCards.filter(c => {
                const t = titleField ? ((c.data[titleField.id]) || '').toLowerCase() : '';
                return t.includes(search);
            }) : gCards;

            document.getElementById('count').textContent = `共 ${filtered.length} / ${gCards.length} 条`;

            if (filtered.length === 0) {
                app.innerHTML = '<div class="loading">无匹配结果</div>';
                return;
            }

            app.innerHTML = filtered.map(card => {
                const title = titleField ? (card.data[titleField.id] || '-') : '-';
                const img = imgField ? (card.data[imgField.id] || '') : '';
                const totalStock = totalStockField ? parseFloat(card.data[totalStockField.id]) || 0 : 0;
                const sales = salesField ? parseFloat(card.data[salesField.id]) || 0 : 0;
                const stock = totalStock - sales;
                const imgHtml = img ? `<img src="${img}" alt="${title}" onerror="this.style.display='none';this.parentElement.innerHTML='加载失败'">` : '<span>无图片</span>';
                return `<div class="card"><div class="card-img">${imgHtml}</div><div class="card-title">${title}</div><div class="card-stock${stock < 0 ? ' low' : ''}">库存: ${stock}</div><input></input></div>`;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', render);
        load();
    </script>
</body>
</html>
